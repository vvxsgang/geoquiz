kind = "web"
previewPath = "/"
title = "ГеоКвиз"
version = "1.0.0"
id = "artifacts/geo-quiz"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26064

[services.development]
run = "pnpm --filter @workspace/geo-quiz run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/geo-quiz", "run", "build" ]
publicDir = "artifacts/geo-quiz/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26064"
BASE_PATH = "/"
